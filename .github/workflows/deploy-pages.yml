name: Deploy Papa Rentals to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'papa-rentals/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

# allow this workflow to publish a Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# one live deployment at a time; don't cancel an in-progress publish
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: papa-rentals
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: papa-rentals/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: papa-rentals/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
